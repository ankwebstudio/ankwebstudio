<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | ANK Web Studio</title>

    <link rel="icon" href="img/ANK LOGO.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#0099cc,#005b96);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .thank-card{
            background:#fff;
            border-radius:20px;
            max-width:650px;
            width:100%;
            padding:50px;
            text-align:center;
            box-shadow:0 20px 60px rgba(0,0,0,.15);
        }

        .logo{
            width:140px;
            margin-bottom:25px;
        }

        .check{
            width:90px;
            height:90px;
            background:#28a745;
            color:#fff;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:42px;
            margin:0 auto 25px;
        }

        h1{
            color:#0099cc;
            font-weight:700;
        }

        p{
            color:#555;
            line-height:1.8;
            font-size:17px;
        }

        .info{
            margin-top:30px;
            text-align:left;
            background:#f8f9fa;
            border-radius:12px;
            padding:20px;
        }

        .info p{
            margin-bottom:12px;
            font-size:16px;
        }

        .btn-home{
            margin-top:35px;
            background:#0099cc;
            color:#fff;
            border:none;
            padding:14px 35px;
            border-radius:50px;
            font-weight:600;
            transition:.3s;
        }

        .btn-home:hover{
            background:#0077a8;
            color:#fff;
        }

    </style>

</head>

<body>

<div class="thank-card">

    <img src="img/ANK LOGO.png"
         class="logo"
         alt="ANK Web Studio">

    <div class="check">
        <i class="fas fa-check"></i>
    </div>

    <h1>Thank You!</h1>

    <p>
        Your enquiry has been submitted successfully.
    </p>

    <p>
        Thank you for contacting <strong>ANK Web Studio.</strong><br>
        We have received your request and our team will get back to you within <strong>24 hours.</strong>
    </p>

    <div class="info">

        <p>
            <i class="fas fa-phone text-primary me-2"></i>
            <strong>+91 9656141993</strong>
        </p>

        <p>
            <i class="fas fa-envelope text-primary me-2"></i>
            <strong>ankwebstudio@gmail.com</strong>
        </p>

        <p>
            <i class="fas fa-globe text-primary me-2"></i>
            <a href="https://ankwebstudio.in" target="_blank">
                https://ankwebstudio.in
            </a>
        </p>

    </div>

    <a href="index.html" class="btn btn-home">
        <i class="fas fa-home me-2"></i>
        Back to Home
    </a>

</div>

</body>
</html>
